<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BOL-LMS — Enterprise Learning Platform</title>
    <meta name="description" content="BOL-LMS: A corporate-grade learning management system for modern enterprises. Manage, deploy, and track learning at scale." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Manrope/Inter use display=swap so text paints immediately with a
         fallback font while the webfont loads. -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <!-- PERF: Load the Material Symbols icon font asynchronously (it's ~250 KB
         and was previously render-blocking). Using display=block prevents FOUT
         (raw ligature text flash). The onload callback adds 'mat-icons-ready'
         to <html> which transitions icons from hidden to visible. The <noscript>
         fallback and JS timeout ensure icons are always revealed. -->
    <style>
      /* Hide icon ligature text until the icon font has fully loaded.
         Using visibility (not display:none) so icons still occupy space
         and layout does not shift when they appear. */
      .material-symbols-outlined {
        visibility: hidden;
      }
      html.mat-icons-ready .material-symbols-outlined {
        visibility: visible;
        /* Soft fade-in so the reveal feels intentional, not jarring */
        animation: _msReveal 0.12s ease forwards;
      }
      @keyframes _msReveal {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
    </style>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block"
      media="print"
      onload="this.media='all';document.documentElement.classList.add('mat-icons-ready')"
    />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" rel="stylesheet" />
      <style>.material-symbols-outlined { visibility: visible; }</style>
    </noscript>
    <!-- Failsafe: if font loading takes >4 s (e.g. offline / very slow network),
         reveal icons anyway so the UI is not permanently broken. -->
    <script>
      (function () {
        var TIMEOUT = 4000;
        function reveal() {
          document.documentElement.classList.add('mat-icons-ready');
        }
        // Already revealed by onload? Nothing to do.
        // Otherwise set a hard deadline so icons never stay hidden.
        var t = setTimeout(reveal, TIMEOUT);
        // Cancel the timeout the moment the font is confirmed ready.
        if (document.fonts && document.fonts.ready) {
          document.fonts.ready.then(function () {
            clearTimeout(t);
            reveal();
          });
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
